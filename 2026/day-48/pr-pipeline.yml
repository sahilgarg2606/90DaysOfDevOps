name: pr pipeline

on: 
    pull_request:
        branches: [dev]
        types: [opened, synchronize]

jobs:
    build-test:
        uses: ./.github/workflows/reusable-build-test.yml
        with: 
            python_version: "3.13"
            run_tests: true
    pr-comment:
        runs-on: ubuntu-latest
        needs: [build-test]
        steps:
            - name: print summary
              run: |
                echo "PR checks passed for branch: ${{ github.head_ref || github.ref_name }}"